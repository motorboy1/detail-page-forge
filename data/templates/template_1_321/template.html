<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forget Me Not</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
.hero { min-height: 100vh; background: linear-gradient(135deg, #87ceeb 0%, #98fb98 30%, #87ceeb 60%, #daf0da 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 80px 40px 60px; position: relative; }
.hero-title { font-size: 72px; font-weight: 900; color: #fff; text-transform: uppercase; line-height: 1; }
.hero-title span { display: inline-block; margin-left: 200px; }
.hero-body { max-width: 600px; margin: 40px 0; }
.hero-body p { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #fff; line-height: 1.6; letter-spacing: 0.5px; }
.hero-footer { margin-top: auto; }
.hero-footer h2 { font-size: 36px; font-weight: 900; color: #000; margin-bottom: 12px; }
.hero-footer p { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #000; line-height: 1.6; }
</style>
</head>
<body>
<section class="hero">
<h1 class="hero-title"><span data-slot="text_0" data-slot-type="text">FORGET</span> <span data-slot="text_1" data-slot-type="text">ME NOT</span></h1>
<div class="hero-body">
<p data-slot="text_2" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</div>
<div class="hero-footer">
<h2 data-slot="text_3" data-slot-type="text">OPEN 24H</h2>
<p data-slot="text_4" data-slot-type="text">Adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</div>
</section>
</body>
</html>
