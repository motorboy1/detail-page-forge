<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Islamic Astronomy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a20;min-height:100vh;color:#fff}
.container{max-width:600px;margin:0 auto;padding:30px;position:relative;min-height:100vh}
.star{position:absolute;font-size:20px;color:rgba(200,220,255,0.3)}
.star1{top:20px;left:30px}.star2{bottom:30px;right:30px}.star3{bottom:120px;left:20px}
.headline-left{font-size:42px;font-weight:900;line-height:1.3;position:absolute;top:30px;left:30px}
.subtitle{font-size:12px;color:rgba(200,220,255,0.6);position:absolute;top:30px;right:30px;text-align:right;max-width:150px;line-height:1.8}
.arch-frame{position:relative;margin:120px auto 30px;width:300px;height:400px;border:2px solid rgba(200,220,255,0.3);border-radius:150px 150px 10px 10px;overflow:hidden;background:linear-gradient(180deg,#0a1540 0%,#152060 30%,#2040a0 60%,#1030a0 100%)}
.arch-stars{width:100%;height:100%;background:radial-gradient(circle at 50% 40%,rgba(180,200,255,0.3),transparent 60%)}
.subtitle-en{position:absolute;top:140px;right:30px;font-size:9px;letter-spacing:2px;color:rgba(200,220,255,0.4);writing-mode:vertical-rl}
.headline-right{font-size:42px;font-weight:900;position:absolute;bottom:80px;right:30px;text-align:right;line-height:1.3}
.footnote{position:absolute;bottom:80px;left:30px;font-size:12px;color:rgba(200,220,255,0.6);max-width:180px;line-height:1.8}
.en-bottom{position:absolute;bottom:30px;left:30px;font-size:9px;color:rgba(200,220,255,0.3);letter-spacing:2px;writing-mode:vertical-rl}
</style></head><body>
<div class="container">
<div class="star star1">*</div><div class="star star2">*</div><div class="star star3">*</div>
<h1 class="headline-left" data-slot="headline_left">이슬람권의<br>천문학</h1>
<p class="subtitle" data-slot="subtitle">이슬람 문화권의 천문학 기초를 살펴보다.</p>
<div class="arch-frame"><div class="arch-stars"></div></div>
<span class="subtitle-en" data-slot="subtitle_en">ASTRONOMY OF THE ISLAMIC CIVILIZATION</span>
<div class="headline-right" data-slot="headline_right">그리고<br>수비학까지</div>
<p class="footnote" data-slot="footnote">그리고 신비주의 수비학까지 연결해보다.</p>
<span class="en-bottom">ASTRONOMY OF THE ISLAMIC CIVILIZATION</span>
</div></body></html>
