<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Look Through The Text</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
.hero { min-height: 100vh; background: #0a0a0a; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
.hero-text { font-size: 90px; font-weight: 900; line-height: 0.95; letter-spacing: -3px; background: linear-gradient(180deg, #a0b0c0 0%, #6b7b3a 40%, #4a5a2a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-description { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #8a8a3a; max-width: 600px; margin: 0 auto; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<section class="hero">
  <h1 class="hero-text" data-slot="text_0" data-slot-type="text">LOOK THROUGH THE TEXT THAT KILLS YOU. YOU MUST LOOK INTO IT EVERY ANSWER IS IN IT</h1>
  <p class="hero-description" data-slot="text_1" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit</p>
</section>
</body>
</html>
