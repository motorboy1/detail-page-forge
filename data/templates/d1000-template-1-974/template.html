<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stargazer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif}
.hero{min-height:100vh;background:#1e1015;display:flex;flex-direction:column;padding:50px 40px;position:relative;overflow:hidden}
.frame{position:absolute;top:40px;left:30px;right:30px;bottom:40px;border:2px solid #ff0033;pointer-events:none}
.frame::before{content:'';position:absolute;top:-2px;left:-2px;width:20px;height:20px;border-top:2px solid #ff0033;border-left:2px solid #ff0033}
.frame::after{content:'';position:absolute;top:-2px;right:-2px;width:20px;height:20px;border-top:2px solid #ff0033;border-right:2px solid #ff0033}
.title-badge{display:inline-block;background:#ff0033;padding:10px 30px;margin-bottom:20px;align-self:flex-start}
.title-badge h1{color:#fff;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;text-transform:uppercase;letter-spacing:3px}
.meta{color:#ff6600;font-size:0.95rem;font-weight:700;font-family:monospace;line-height:1.8;margin-bottom:30px}
.flower-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80%}
.flower-img img{width:100%;filter:drop-shadow(0 -10px 30px rgba(255,0,51,0.2))}
.desc{color:#ff6600;font-size:0.85rem;line-height:1.6;max-width:450px;position:relative;z-index:2;margin-top:auto}
</style></head>
<body>
<section class="hero">
<div class="frame"></div>
<div class="title-badge"><h1>Stargazer</h1></div>
<div class="meta">001102 ANALYZING....<br><strong>011102 ANALYZED (200OK)</strong></div>
<div class="flower-img"><img src="https://placehold.co/500x600/ffc0cb/fff?text=Lily" alt="Stargazer Lily"></div>
<p class="desc">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Lorem ipsum</p>
</section>
</body></html>
