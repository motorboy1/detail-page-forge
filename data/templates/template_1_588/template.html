<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretend to be a Genius</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
.hero { min-height: 100vh; background: linear-gradient(180deg, #ffff00 0%, #fff9c4 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 40px; }
.hero-script { font-family: 'Brush Script MT', cursive; font-size: 90px; color: #7c4dff; margin-bottom: -10px; }
.hero-badge { display: inline-block; background: #7c4dff; color: #fff; font-size: 18px; font-weight: 900; padding: 8px 14px; border-radius: 20px; margin-right: 10px; }
.hero-title { font-size: 100px; font-weight: 900; color: #7c4dff; letter-spacing: -3px; line-height: 0.95; }
.hero-image { width: 300px; height: 350px; margin: 30px 0; background: linear-gradient(135deg, #b39ddb, #7c4dff); border-radius: 50% 50% 45% 45%; }
.hero-description { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #333; max-width: 600px; line-height: 1.6; margin-top: 30px; }
</style>
</head>
<body>
<section class="hero">
  <span class="hero-script" data-slot="text_0" data-slot-type="text">Pretend</span>
  <div style="display:flex;align-items:center;margin-bottom:10px;">
    <span class="hero-badge" data-slot="text_1" data-slot-type="text">TO BE A</span>
    <h1 class="hero-title" data-slot="text_2" data-slot-type="text">GENIUS</h1>
  </div>
  <div class="hero-image" data-slot="image_0" data-slot-type="image"></div>
  <p class="hero-description" data-slot="text_3" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet</p>
</section>
</body>
</html>
