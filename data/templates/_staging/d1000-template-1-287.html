<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; }
  .hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff69b4 0%, #fff0f5 50%, #ffb6c1 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 60px 40px;
    text-align: center;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .hero h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    max-width: 800px;
  }
  .hero h1 span {
    font-weight: 400;
    display: block;
  }
  .decorations {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    flex: 1;
    padding: 80px 0;
  }
  .star-small {
    width: 80px;
    height: 80px;
  }
  .star-large {
    width: 160px;
    height: 160px;
  }
  .star-small svg, .star-large svg {
    width: 100%;
    height: 100%;
    fill: #fff;
  }
  .body-text {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 700;
    line-height: 1.6;
    text-transform: uppercase;
    max-width: 700px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<section class="hero">
  <h1>EVERYONE DREAMS OF <span>TRANSCENDENCE</span></h1>
  <div class="decorations">
    <div class="star-small">
      <svg viewBox="0 0 100 100"><polygon points="50,0 56,38 95,38 63,60 76,97 50,73 24,97 37,60 5,38 44,38" fill="white"/></svg>
    </div>
    <div class="star-large">
      <svg viewBox="0 0 200 200"><polygon points="100,0 115,70 200,80 130,115 150,200 100,145 50,200 70,115 0,80 85,70" fill="white"/></svg>
    </div>
    <div class="star-small">
      <svg viewBox="0 0 100 100"><polygon points="50,0 56,38 95,38 63,60 76,97 50,73 24,97 37,60 5,38 44,38" fill="white"/></svg>
    </div>
  </div>
  <p class="body-text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</section>
</body>
</html>
