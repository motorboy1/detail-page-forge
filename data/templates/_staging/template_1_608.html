<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bold Red Statement</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Georgia', serif; }
.hero { min-height: 100vh; background: #ff0000; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 40px; }
.hero-title-line { font-size: 48px; font-weight: 400; color: #1a1a1a; line-height: 1.1; font-style: italic; }
.hero-highlight { font-size: 52px; font-weight: 900; font-style: italic; color: #ccff00; line-height: 1.3; }
.hero-highlight-bubble { font-size: 48px; font-weight: 900; font-style: italic; color: #1a1a1a; background: #ccff00; border-radius: 30px; padding: 5px 15px; display: inline-block; margin: 4px 0; }
.hero-footer { text-align: center; }
.hero-icons { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
.hero-icon { width: 24px; height: 24px; background: #ccff00; border-radius: 50%; }
.hero-description { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #1a1a1a; max-width: 500px; margin: 0 auto; line-height: 1.6; }
</style>
</head>
<body>
<section class="hero">
  <div>
    <div class="hero-title-line" data-slot="text_0" data-slot-type="text">Eiusmod Lorem Ipsum Dolor Sit</div>
    <div class="hero-highlight" data-slot="text_1" data-slot-type="text">Amet, Consec Adipiscing Elit,</div>
    <div class="hero-highlight" data-slot="text_2" data-slot-type="text">Sed Do Eiusmod Lorem Ipsum</div>
    <div class="hero-highlight-bubble" data-slot="text_3" data-slot-type="text">Dolor Sit Amet, Consec</div>
    <div class="hero-highlight-bubble" data-slot="text_4" data-slot-type="text">Adipiscing Elit, Sed Do Eiusmod</div>
  </div>
  <div class="hero-footer">
    <div class="hero-icons" data-slot="image_0" data-slot-type="image"></div>
    <p class="hero-description" data-slot="text_5" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
  </div>
</section>
</body>
</html>
