<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow the Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #DDD0BE;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .header {
    padding: 48px 40px 0;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .title {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 700;
    color: #2A4A28;
    line-height: 1.1;
  }
  .title .arrow { font-weight: 400; }
  .desc {
    margin-top: 16px;
    font-size: 1rem;
    line-height: 1.6;
    color: #2A4A28;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  .path-scene {
    flex: 1;
    position: relative;
    min-height: 500px;
  }
  .winding-path {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100%;
  }
  .winding-path svg {
    width: 100%;
    height: 100%;
  }
  .tree-icon {
    position: absolute;
    top: 35%;
    left: 48%;
    transform: translateX(-50%);
    font-size: 4rem;
    z-index: 2;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  @media (max-width: 768px) {
    .header { padding: 32px 24px 0; }
  }
</style>
</head>
<body>
  <div class="header">
    <h1 class="title">Follow the <span class="arrow">&#x2192;</span> path</h1>
    <p class="desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
  </div>
  <div class="path-scene">
    <div class="tree-icon">&#x1F332;</div>
    <div class="winding-path">
      <svg viewBox="0 0 800 600" preserveAspectRatio="none" fill="#2A4A28">
        <path d="M0,600 L0,350 Q100,250 250,300 Q400,350 450,250 Q500,150 650,200 Q800,250 800,150 L800,600 Z"/>
      </svg>
    </div>
  </div>
</body>
</html>
