<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio XXAX Opening</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Anton', 'Impact', sans-serif;
    background: #FFD726;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px;
  }

  .poster-text {
    font-size: clamp(3rem, 10vw, 7.5rem);
    font-weight: 400;
    color: #000;
    line-height: 1.0;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    word-spacing: 0.3em;
  }
  .poster-text .line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .footer-text {
    margin-top: 40px;
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    font-weight: 700;
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  @media (max-width: 768px) {
    body { padding: 24px; }
    .poster-text { font-size: clamp(2rem, 8vw, 4rem); }
  }
</style>
</head>
<body>
  <div class="poster-text">
    <div class="line"><span>Studio</span><span>XXAX</span></div>
    <div class="line"><span>Opening</span><span>Show</span></div>
    <div class="line"><span>At</span><span>Hapjeong,</span></div>
    <div class="line"><span>Seoul,</span><span>South</span></div>
    <div class="line"><span>Korea</span><span>@ 10.14</span></div>
    <div class="line"><span>PM 8:00</span><span>- 10:00</span></div>
  </div>
  <p class="footer-text">Find us in Instagram @xxax.kr</p>
</body>
</html>
