<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XPAD PRO 2025</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #F5DEB3 0%, #D4E6F1 100%);
    display: flex;
    flex-direction: column;
    padding: 60px 40px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  .title-group {
    margin-bottom: 40px;
  }
  .title-main {
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    color: #333;
  }
  .title-sub {
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    background: linear-gradient(180deg, #FF8C00, #00BFFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .year-badge {
    display: inline-flex;
    align-items: center;
    border: 2px solid #555;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    font-weight: 700;
    color: #555;
    margin-left: 12px;
    vertical-align: middle;
    writing-mode: vertical-rl;
  }
  .tablets-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .tablet {
    position: absolute;
    width: 260px;
    height: 360px;
    background: linear-gradient(135deg, #F5DEB3, #B8D4E8);
    border: 8px solid #333;
    border-radius: 24px;
    box-shadow: 4px 8px 24px rgba(0,0,0,0.15);
  }
  .tablet:nth-child(1) { transform: rotate(-20deg) translateX(-40px); z-index: 1; }
  .tablet:nth-child(2) { transform: rotate(-10deg) translateX(20px) translateY(-30px); z-index: 2; }
  .tablet:nth-child(3) { transform: rotate(5deg) translateX(60px) translateY(20px); z-index: 3; }
  @media (max-width: 600px) {
    body { padding: 32px 20px; }
    .tablet { width: 160px; height: 220px; }
  }
</style>
</head>
<body>
  <div class="title-group">
    <h1 class="title-main">XPAD</h1>
    <span class="title-sub">PRO</span>
    <span class="year-badge">2025</span>
  </div>
  <div class="tablets-area">
    <div class="tablet"></div>
    <div class="tablet"></div>
    <div class="tablet"></div>
  </div>
</body>
</html>
