<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highest IQs Among Animals</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    padding: 32px;
  }

  .animal-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: auto auto;
    gap: 8px;
  }
  .animal-card {
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    aspect-ratio: 1;
    font-size: 4rem;
  }
  .card-large {
    grid-row: 1 / 2;
    grid-column: 1 / 2;
    aspect-ratio: 1;
  }
  .right-stack {
    grid-row: 1 / 2;
    grid-column: 2 / 3;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .right-stack .animal-card {
    aspect-ratio: auto;
    flex: 1;
  }
  .bottom-row {
    grid-column: 1 / 3;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .bottom-row .animal-card {
    aspect-ratio: 1;
  }

  .bg-tan { background: #D4B896; }
  .bg-pink { background: #F5D5C8; }
  .bg-gray { background: #C0B8B0; }
  .bg-blue { background: #A8C8E0; }
  .bg-dark { background: #1A2030; }
  .bg-beige { background: #C8B8A0; }

  .content-section {
    margin-top: 32px;
    padding: 0 8px;
  }
  .content-title {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    color: #000;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .content-text {
    margin-top: 12px;
    font-size: 1rem;
    line-height: 1.6;
    color: #333;
    text-align: justify;
  }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .animal-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
  <div class="animal-grid">
    <div class="animal-card card-large bg-tan">&#x1F98C;</div>
    <div class="right-stack">
      <div class="animal-card bg-pink" style="font-size:3rem">&#x1F98E;</div>
      <div class="animal-card bg-gray" style="font-size:3rem">&#x1F98F;</div>
    </div>
    <div class="bottom-row">
      <div class="animal-card bg-blue" style="font-size:2.5rem">&#x1F426;</div>
      <div class="animal-card bg-dark" style="font-size:2.5rem">&#x1F42C;</div>
      <div class="animal-card bg-beige" style="font-size:2.5rem">&#x1F412;</div>
    </div>
  </div>
  <div class="content-section">
    <h1 class="content-title">Highest IQs<br>Among Animals</h1>
    <p class="content-text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
  </div>
</body>
</html>
