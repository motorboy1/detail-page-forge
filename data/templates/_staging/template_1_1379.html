<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: linear-gradient(180deg, #000020 0%, #1a0060 40%, #000020 60%, #000000 100%); font-family: 'Playfair Display', serif; color: #ffffff; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.glow { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 400px; background: radial-gradient(ellipse, rgba(80,60,200,0.5) 0%, transparent 70%); pointer-events: none; }
.container { position: relative; z-index: 2; text-align: center; }
.subtitle { font-size: 72px; font-style: italic; font-weight: 400; color: #ffffff; line-height: 1.3; margin-bottom: 60px; }
.big-number { font-size: 380px; font-weight: 700; line-height: 0.85; color: #ffffff; text-shadow: 0 0 80px rgba(150,120,255,0.4); }
.reflection { font-size: 380px; font-weight: 700; line-height: 0.85; color: rgba(255,255,255,0.08); transform: scaleY(-1); filter: blur(8px); margin-top: -40px; }
.horizon { width: 100%; height: 4px; background: linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.05) 50%, transparent 90%); margin-top: -200px; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <p class="subtitle">Thank you<br>for the followers</p>
  <div class="big-number">900M</div>
  <div class="horizon"></div>
  <div class="reflection">900M</div>
</div>
</body>
</html>
