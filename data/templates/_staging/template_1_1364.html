<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #f5f3f0; font-family: 'Inter', sans-serif; color: #1a1a1a; position: relative; overflow: hidden; }
.container { padding: 60px 80px; min-height: 2400px; display: flex; flex-direction: column; }
.top-text { max-width: 550px; margin-bottom: 100px; }
.top-text p { font-size: 18px; line-height: 1.7; color: rgba(26,26,26,0.6); font-weight: 300; }
.statement { margin-bottom: 80px; }
.line { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
.serif { font-family: 'Playfair Display', serif; font-size: 150px; font-weight: 900; line-height: 1.05; color: #1a1a1a; }
.serif-italic { font-family: 'Playfair Display', serif; font-size: 150px; font-weight: 700; font-style: italic; line-height: 1.05; color: #1a1a1a; }
.inline-img { width: 220px; height: 140px; border-radius: 8px; overflow: hidden; display: inline-flex; flex-shrink: 0; }
.inline-img img { width: 100%; height: 100%; object-fit: cover; }
.statement-2 { margin-top: 80px; }
</style>
</head>
<body>
<div class="container">
  <div class="top-text">
    <p>Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
  </div>
  <div class="statement">
    <div class="line"><span class="serif">Sometimes, We</span></div>
    <div class="line">
      <span class="serif">Dream</span>
      <div class="inline-img"><img src="stars.jpg" alt="Night Sky"></div>
      <span class="serif">of</span>
    </div>
    <div class="line">
      <div class="inline-img"><img src="blob.jpg" alt="Organic Shape"></div>
      <span class="serif-italic">Eden.</span>
    </div>
  </div>
  <div class="statement statement-2">
    <div class="line"><span class="serif">We often dream</span></div>
    <div class="line">
      <span class="serif">of</span>
      <div class="inline-img"><img src="skeleton.jpg" alt="Skeleton"></div>
      <span class="serif">our</span>
      <div class="inline-img"><img src="apple.jpg" alt="Apple"></div>
      <span class="serif-italic">Sins.</span>
    </div>
  </div>
</div>
</body>
</html>
