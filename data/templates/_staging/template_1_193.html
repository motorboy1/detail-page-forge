<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boy Meets Girl 1984</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 40px;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }
  .flow-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px 16px;
    align-items: center;
  }
  .word {
    font-size: clamp(1.8rem, 5.5vw, 3.5rem);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .word.italic {
    font-style: italic;
  }
  .word.highlight {
    color: #CCFF00;
  }
  .arrow {
    color: #CCFF00;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
  }
  .connector {
    border: 2px solid #CCFF00;
    height: 2px;
    width: 100%;
  }
  .image-placeholder {
    width: 120px;
    height: 120px;
    background: linear-gradient(135deg, #666 0%, #888 50%, #555 100%);
    border: 2px solid #CCFF00;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .row-span-3 { grid-column: span 3; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
  }
</style>
</head>
<body>
  <div class="flow-grid">
    <span class="word">LEOS</span>
    <span class="arrow">&#8594;</span>
    <span class="word">CARAX'S</span>

    <span class="word">DEBUT</span>
    <span class="word">FILM</span>
    <span class="word italic">BOY</span>

    <span class="word highlight italic">MEETS</span>
    <span class="word highlight">GIRL</span>
    <span class="word">1984</span>

    <span class="word">HAS</span>
    <span class="connector"></span>
    <span class="word">BEEN</span>

    <span class="word">ARCHIVED</span>
    <span class="word">FOR</span>
    <span class="word">40</span>

    <span class="word">YEARS</span>
    <span class="word">AND</span>
    <span class="word">WILL BE</span>

    <span class="word highlight">REVEALED</span>
    <div class="image-placeholder"></div>
    <span class="word">THIS</span>

    <span class="word highlight">SUMMER</span>
    <span></span>
    <span></span>
  </div>
</body>
</html>
