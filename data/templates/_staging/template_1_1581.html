<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mclaren On The Way</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Inter', sans-serif;
  }

  .dark-section {
    background: #2E3340;
    flex: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 64px 40px 0;
    position: relative;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(3rem, 8vw, 5rem);
    color: #fff;
    text-align: center;
    line-height: 1.1;
  }

  .car-placeholder {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 100px;
    background: linear-gradient(145deg, #E0E0E0, #B0B0B0);
    border-radius: 50% 50% 10% 10% / 40% 40% 20% 20%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .car-placeholder::before {
    content: '';
    position: absolute;
    top: 10%;
    left: 20%;
    width: 60%;
    height: 45%;
    background: rgba(30,30,40,0.5);
    border-radius: 40% 40% 5% 5%;
  }
  .car-placeholder::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 12%;
    width: 16%;
    height: 24%;
    background: #555;
    border-radius: 50%;
    box-shadow: 140px 0 0 #555;
  }

  .light-section {
    background: #EDEBE4;
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  .desc-text {
    font-size: 1rem;
    line-height: 1.6;
    color: #222;
    text-align: center;
    max-width: 560px;
  }

  @media (max-width: 768px) {
    .dark-section { padding: 40px 24px 0; }
    .car-placeholder { width: 160px; height: 70px; }
    .light-section { padding: 60px 24px 32px; }
  }
</style>
</head>
<body>
  <section class="dark-section">
    <h1 class="hero-title">Mclaren<br>On The Way,</h1>
    <div class="car-placeholder"></div>
  </section>
  <section class="light-section">
    <p class="desc-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
  </section>
</body>
</html>
