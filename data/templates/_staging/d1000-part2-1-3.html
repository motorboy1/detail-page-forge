<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Inter:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
  .hero {
    min-height: 100vh;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    padding: 30px 40px;
    font-size: 0.85rem;
    color: rgba(180, 220, 230, 0.7);
    font-weight: 300;
  }
  .visual {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .keyhole {
    width: 400px;
    height: 500px;
    background: radial-gradient(ellipse at center top, rgba(180,220,240,0.6) 0%, rgba(100,150,170,0.2) 40%, transparent 70%);
    border-radius: 50% 50% 5% 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .astronaut {
    width: 120px;
    height: 180px;
    background: radial-gradient(ellipse, rgba(200,200,200,0.5) 0%, transparent 70%);
    border-radius: 30% 30% 5% 5%;
  }
  .side-titles {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 50px;
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: rgba(180, 220, 230, 0.6);
  }
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 30px 40px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .bottom-bar .title-ko {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    color: rgba(140, 200, 210, 0.9);
  }
  .bottom-bar .desc {
    font-size: 0.8rem;
    color: rgba(180, 220, 230, 0.5);
    font-weight: 300;
    max-width: 280px;
  }
</style>
</head>
<body>
<section class="hero">
  <div class="top-bar">
    <span>지은이 홍길동</span>
    <span>2026</span>
    <span>출판사 한음사</span>
  </div>
  <div class="visual">
    <div class="keyhole">
      <div class="astronaut"></div>
    </div>
    <div class="side-titles">
      <span>WASTELAND</span>
      <span>ASTRONAUT</span>
    </div>
  </div>
  <div class="bottom-bar">
    <p class="desc">사람들은 황야 너머에는 우주가 없다고 말했다.</p>
    <p class="title-ko">황야의 우주인</p>
    <p class="desc">그런데, 나는 우주복을 물려받은 적이 있다.</p>
  </div>
</section>
</body>
</html>
