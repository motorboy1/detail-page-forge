<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Kapadokya</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
.hero { min-height: 100vh; background: linear-gradient(180deg, #e68a00 0%, #cc7a30 20%, #b0a0d0 50%, #9090c0 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 30px; position: relative; overflow: hidden; }
.hero-title { font-size: 90px; font-weight: 900; color: #fff; line-height: 0.95; letter-spacing: -2px; font-style: italic; }
.balloons { display: flex; gap: 20px; justify-content: center; flex: 1; align-items: center; position: relative; }
.balloon { width: 200px; height: 250px; background: linear-gradient(180deg, #ff4500, #ffa500 25%, #32cd32 50%, #1e90ff 75%); border-radius: 50% 50% 10% 10%; }
.balloon-sm { width: 120px; height: 150px; background: linear-gradient(180deg, #ff4500, #ffa500 25%, #32cd32 50%, #1e90ff 75%); border-radius: 50% 50% 10% 10%; filter: blur(2px); opacity: 0.7; }
.balloon-text { font-size: 14px; color: #fff; max-width: 180px; line-height: 1.4; }
.hero-footer { text-align: center; }
.hero-brand { font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
.hero-desc { font-size: 13px; color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<section class="hero">
  <h1 class="hero-title" data-slot="text_0" data-slot-type="text">WELCOME TO KAPADOKYA</h1>
  <div class="balloons">
    <div class="balloon" data-slot="image_0" data-slot-type="image"></div>
    <div>
      <p class="balloon-text" data-slot="text_1" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
      <div class="balloon-sm" data-slot="image_1" data-slot-type="image"></div>
    </div>
    <p class="balloon-text" data-slot="text_2" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
  </div>
  <div class="hero-footer">
    <h2 class="hero-brand" data-slot="text_3" data-slot-type="text">TOUR BY AASVOGEL</h2>
    <p class="hero-desc" data-slot="text_4" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor</p>
  </div>
</section>
</body>
</html>
