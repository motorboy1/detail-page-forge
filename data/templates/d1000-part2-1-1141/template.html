<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Klaus Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Helvetica Neue',sans-serif}
.hero{min-height:100vh;background:#f5f5f5;display:flex;flex-direction:column;padding:15px 20px}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:0.7rem;color:#333;margin-bottom:10px}
.date-divider{text-align:center;color:#888;font-size:0.75rem;margin:10px 0;position:relative}
.date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:#ccc}
.date-divider::before{left:0}
.date-divider::after{right:0}
.chat-area{display:flex;flex-direction:column;gap:15px;flex:1}
.bubble{max-width:75%;padding:14px 20px;border-radius:20px;font-size:0.95rem;line-height:1.5;position:relative}
.bubble-left{background:#7c4dff;color:#fff;align-self:flex-start;border-bottom-left-radius:4px}
.bubble-right{background:#e8e8e8;color:#333;align-self:flex-end;border-bottom-right-radius:4px}
.product-card{background:#d8d4e8;border-radius:20px;padding:30px;margin:10px 0;text-align:center;align-self:center;width:80%}
.product-brand{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900;color:#000;margin-bottom:20px}
.product-card img{width:60%;margin:10px auto;display:block}
.product-link{color:#3344cc;text-decoration:underline;font-size:0.9rem;margin-top:15px;display:block}
.heart{font-size:1.2rem;text-align:center;margin-top:5px}
</style></head>
<body>
<section class="hero">
<div class="status-bar"><span>●  ᐃᐃᐃᐃ</span><span>□</span></div>
<div class="date-divider">2026년 1월 세일기간</div>
<div class="chat-area">
<div class="bubble bubble-left">아직도 이 모자 못 산 흑우 없지?</div>
<div class="bubble bubble-right">이미 클라우스에서 구매했어 ㅋ</div>
<div class="bubble bubble-left">?이걸 진짜 샀다고?</div>
<div class="product-card">
<div class="product-brand">KLAUS™</div>
<img src="https://placehold.co/250x180/eee/999?text=Cap" alt="Cap">
<a class="product-link" href="#">www.klaus.co.kr</a>
</div>
<div class="heart">❤️</div>
</div>
</section>
</body></html>
