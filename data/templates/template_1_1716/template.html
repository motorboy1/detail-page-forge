<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Castle Of The Ice Wizard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #D6EAF8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 48px 40px;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .top-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .title-left {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 9vw, 5.5rem);
    font-weight: 700;
    color: #1B4F72;
    line-height: 1;
    text-transform: uppercase;
  }
  .title-left .first-letter { font-size: 1.15em; }
  .body-upper-right {
    font-size: clamp(0.8rem, 1.8vw, 0.95rem);
    color: #5B8FA8;
    text-align: right;
    max-width: 280px;
    line-height: 1.6;
    font-style: italic;
    padding-top: 12px;
  }
  .frame-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin: 20px 0;
  }
  .ogee-frame {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 0.85;
    background: linear-gradient(180deg, #B8D9F0 0%, #A0CBE8 50%, #D6EAF8 100%);
    border: 2px solid #fff;
    border-radius: 8px;
    clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .castle-placeholder {
    width: 60%;
    aspect-ratio: 1;
    background: linear-gradient(180deg, #85C1E9 0%, #5DADE2 50%, #AED6F1 100%);
    border-radius: 50% 50% 8px 8px;
    opacity: 0.6;
  }
  .bottom-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 20px;
  }
  .body-lower-left {
    font-size: clamp(0.8rem, 1.8vw, 0.95rem);
    color: #5B8FA8;
    max-width: 280px;
    line-height: 1.6;
    font-style: italic;
  }
  .title-right {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    color: #1B4F72;
    text-align: right;
    line-height: 1;
    text-transform: uppercase;
  }
  @media (max-width: 600px) {
    body { padding: 24px 20px; }
    .top-section, .bottom-section { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>
<div class="top-section">
<h1 class="title-left" data-slot="text_0" data-slot-type="text"><span class="first-letter">C</span>astle<br/>of</h1>
<p class="body-upper-right" data-slot="text_1" data-slot-type="text">"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
</div>
<div class="frame-area">
<div class="ogee-frame">
<div class="castle-placeholder"></div>
</div>
</div>
<div class="bottom-section">
<p class="body-lower-left" data-slot="text_2" data-slot-type="text">"Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
<h2 class="title-right" data-slot="text_3" data-slot-type="text">The Ice<br/>Wizard</h2>
</div>
</body>
</html>
