<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #ffffff; font-family: 'Inter', sans-serif; color: #000000; position: relative; overflow: hidden; }
.glow { position: absolute; top: 30%; left: 35%; width: 800px; height: 1000px; background: radial-gradient(ellipse, rgba(0,200,50,0.45) 0%, rgba(0,255,80,0.15) 40%, transparent 70%); pointer-events: none; }
.container { position: relative; z-index: 2; padding: 60px 80px; display: flex; flex-direction: column; justify-content: center; min-height: 2400px; }
.line { margin-bottom: 10px; }
.line-bold { font-family: 'Oswald', sans-serif; font-size: 160px; font-weight: 900; text-transform: uppercase; line-height: 1.0; }
.line-italic { font-family: 'Playfair Display', serif; font-size: 140px; font-style: italic; font-weight: 700; line-height: 1.0; }
.line-mixed { display: flex; align-items: baseline; gap: 30px; flex-wrap: wrap; }
.line-mixed .bold { font-family: 'Oswald', sans-serif; font-size: 160px; font-weight: 900; text-transform: uppercase; }
.line-mixed .italic { font-family: 'Playfair Display', serif; font-size: 140px; font-style: italic; }
.line-script { font-family: 'Playfair Display', serif; font-size: 130px; font-style: italic; line-height: 1.1; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
<div class="line"><span class="line-bold" data-slot="text_0" data-slot-type="text">SOME</span></div>
<div class="line line-mixed">
<span class="italic" data-slot="text_1" data-slot-type="text">Move</span>
<span class="bold" data-slot="text_2" data-slot-type="text">ments</span>
</div>
<div class="line line-mixed">
<span class="bold" data-slot="text_3" data-slot-type="text">ARE</span>
<span class="bold" data-slot="text_4" data-slot-type="text">NOT</span>
</div>
<div class="line line-mixed">
<span class="bold" data-slot="text_5" data-slot-type="text">MEANT</span>
<span class="bold" data-slot="text_6" data-slot-type="text">TO</span>
</div>
<div class="line"><span class="line-script" data-slot="text_7" data-slot-type="text">change</span></div>
<div class="line line-mixed">
<span class="bold" data-slot="text_8" data-slot-type="text">ANY</span>
<span class="bold" data-slot="text_9" data-slot-type="text">THING</span>
</div>
</div>
</body>
</html>
