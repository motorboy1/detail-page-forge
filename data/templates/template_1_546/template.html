<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflection Domain</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Georgia', serif; }
.hero { min-height: 100vh; background: #f2ece6; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 40px; position: relative; overflow: hidden; }
.pattern-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 800px; margin-bottom: 60px; }
.pattern-item { width: 120px; height: 120px; background: #556b2f; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
.pattern-accent { width: 120px; height: 100px; background: #cc0000; border-radius: 10px; }
.hero-title { font-family: 'Brush Script MT', cursive; font-size: 80px; color: #333; letter-spacing: 2px; margin-bottom: 10px; }
.hero-subtitle { font-family: 'Brush Script MT', cursive; font-size: 60px; color: #666; margin-bottom: 20px; }
.hero-description { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #555; max-width: 400px; text-align: right; align-self: flex-end; }
</style>
</head>
<body>
<section class="hero">
  <div class="pattern-grid" data-slot="image_0" data-slot-type="image"></div>
  <h1 class="hero-title" data-slot="text_0" data-slot-type="text">Reflection.</h1>
  <h2 class="hero-subtitle" data-slot="text_1" data-slot-type="text">Domain</h2>
  <p class="hero-description" data-slot="text_2" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</section>
</body>
</html>
