<section style="margin:0;padding:0;width:100%;min-height:100vh;background:#0a0a0a;font-family:'Pretendard',sans-serif;color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column">
  <div style="padding:32px 40px 0;display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.5)">
    <span data-slot="author">지은이 홍길동</span>
    <span data-slot="year">2026년 신간</span>
    <span data-slot="publisher">한음출판사</span>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative">
    <div style="position:absolute;inset:10%;background:radial-gradient(ellipse at 40% 60%,#2a2a2a,#0a0a0a);border-radius:30% 70% 50% 50%"></div>
    <div style="position:relative;z-index:2;text-align:center">
      <div style="position:relative;display:inline-block">

      </div>
    </div>
  </div>
  <div style="padding:0 40px 40px;display:flex;justify-content:space-between;align-items:flex-end">
    <div data-slot="brand" style="font-size:14px;font-weight:700;letter-spacing:2px">Gallery<br>KUUN</div>
    <div style="height:30px;width:120px;background:repeating-linear-gradient(90deg,#fff 0px,#fff 1.5px,transparent 1.5px,transparent 4px);opacity:0.3"></div>
  </div>
