<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Just Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
.hero { min-height: 100vh; background: linear-gradient(180deg, #000 0%, #000 8%, #ff4500 8%, #ff4500 50%, #fff 100%); display: flex; flex-direction: column; padding: 0; position: relative; overflow: hidden; }
.hero-header { background: #000; padding: 20px 40px; }
.hero-title { font-size: 80px; font-weight: 900; color: #ff4500; text-transform: uppercase; }
.hero-title .icon { font-size: 48px; }
.hero-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 40px; position: relative; }
.hero-text { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #000; line-height: 1.6; letter-spacing: 0.5px; text-align: center; max-width: 600px; }
.hero-image { position: absolute; right: 40px; bottom: 0; width: 350px; height: 450px; background: rgba(0,0,0,0.3); border-radius: 8px; }
</style>
</head>
<body>
<section class="hero">
<div class="hero-header">
<h1 class="hero-title" data-slot="text_0" data-slot-type="text">JUST RUN</h1>
</div>
<div class="hero-body">
<p class="hero-text" data-slot="text_1" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</div>
</section>
</body>
</html>
