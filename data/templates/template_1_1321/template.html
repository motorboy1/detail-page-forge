<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Inter:wght@300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #a8c256; font-family: 'Inter', sans-serif; color: #2a3a10; position: relative; overflow: hidden; }
.container { padding: 60px 80px; min-height: 2400px; position: relative; }
.title { font-family: 'Oswald', sans-serif; font-size: 130px; font-weight: 900; color: #2a3a10; text-transform: lowercase; margin-bottom: 40px; }
.card-grid { position: relative; min-height: 1800px; }
.card { position: absolute; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; }
.card img { width: 100%; height: 100%; object-fit: cover; }
.card-1 { top: 0; left: 0; width: 420px; height: 500px; }
.card-2 { top: 300px; right: 100px; width: 400px; height: 380px; }
.card-3 { top: 700px; right: 80px; width: 380px; height: 420px; }
.card-4 { bottom: 100px; left: 300px; width: 380px; height: 450px; }
.text-block { position: absolute; max-width: 450px; }
.text-block-1 { top: 700px; left: 60px; }
.text-block-2 { bottom: 100px; right: 60px; }
.text-block p { font-size: 18px; line-height: 1.6; color: #2a3a10; font-weight: 400; text-align: justify; }
</style>
</head>
<body>
<div class="container">
<h1 class="title" data-slot="text_0" data-slot-type="text">exotica collection</h1>
<div class="card-grid">
<div class="card card-1"><img alt="Pitcher Plant" data-slot="img_0" data-slot-type="image" src="plant-1.jpg"/></div>
<div class="card card-2"><img alt="Hosta Plant" data-slot="img_1" data-slot-type="image" src="plant-2.jpg"/></div>
<div class="card card-3"><img alt="Aloe Vera" data-slot="img_2" data-slot-type="image" src="plant-3.jpg"/></div>
<div class="card card-4"><img alt="Venus Flytrap" data-slot="img_3" data-slot-type="image" src="plant-4.jpg"/></div>
<div class="text-block text-block-1">
<p data-slot="text_1" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
</div>
<div class="text-block text-block-2">
<p data-slot="text_2" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
</div>
</div>
</div>
</body>
</html>
