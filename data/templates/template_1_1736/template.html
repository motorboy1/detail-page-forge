<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Multiple Flavors</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 48px 40px;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  .headline {
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: auto;
  }
  .pills-container {
    position: relative;
    width: 100%;
    height: 60vh;
    margin-top: 40px;
  }
  .pill {
    position: absolute;
    padding: 40px 60px;
    border-radius: 100px;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    color: #fff;
    transform: rotate(-35deg);
    white-space: nowrap;
  }
  .pill-banana {
    background: linear-gradient(135deg, #CCCC00, #AAAA00);
    top: 15%;
    left: 15%;
  }
  .pill-orange {
    background: linear-gradient(135deg, #CC8800, #AA6600);
    top: 40%;
    left: 35%;
  }
  .pill-grape {
    background: #7B2FBE;
    top: 60%;
    left: 0%;
  }
  .pill-apple {
    background: #FF0000;
    top: 75%;
    right: 5%;
    padding: 30px 50px;
  }
  @media (max-width: 600px) {
    body { padding: 24px 20px; }
    .pill { padding: 24px 36px; }
  }
</style>
</head>
<body>
<h1 class="headline" data-slot="text_0" data-slot-type="text">Multiple Flavors'</h1>
<div class="pills-container">
<div class="pill pill-banana"><span data-slot="text_1" data-slot-type="text">Bananas</span></div>
<div class="pill pill-orange"><span data-slot="text_2" data-slot-type="text">Oranges</span></div>
<div class="pill pill-grape"><span data-slot="text_3" data-slot-type="text">Grapes</span></div>
<div class="pill pill-apple"><span data-slot="text_4" data-slot-type="text">Apples</span></div>
</div>
</body>
</html>
