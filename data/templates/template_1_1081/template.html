<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@300;400;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #1a2a6c; font-family: 'Inter', sans-serif; color: #ffffff; position: relative; overflow: hidden; }
.bg-texture { position: absolute; inset: 0; background: linear-gradient(170deg, #0d1b5e 0%, #1a2a6c 50%, #243594 100%); }
.container { position: relative; z-index: 2; padding: 100px 140px; display: flex; flex-direction: column; align-items: center; min-height: 2400px; }
.title-block { text-align: center; margin-top: 100px; }
.title { font-family: 'UnifrakturMaguntia', cursive; font-size: 120px; color: #f5d442; letter-spacing: 4px; line-height: 1.05; }
.product-visual { margin: 100px auto; width: 500px; height: 1000px; position: relative; }
.product-visual img { width: 100%; height: 100%; object-fit: contain; }
.product-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(245,212,66,0.15) 100%); pointer-events: none; }
.body-text { max-width: 800px; text-align: center; margin-top: 60px; padding-bottom: 120px; }
.body-text p { font-size: 20px; line-height: 1.8; color: rgba(255,255,255,0.65); font-weight: 300; font-style: italic; }
.edition-label { position: absolute; bottom: 60px; width: 100%; text-align: center; font-size: 14px; letter-spacing: 8px; color: #f5d442; text-transform: uppercase; }
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="container">
<div class="title-block">
<h1 class="title" data-slot="text_0" data-slot-type="text">GRODS<br/>DFRELLG</h1>
</div>
<div class="product-visual">
<img alt="Product" data-slot="img_0" data-slot-type="image" src="product.jpg"/>
<div class="product-overlay"></div>
</div>
<div class="body-text">
<p data-slot="text_1" data-slot-type="text">Where tradition meets innovation in a symphony of royal blues and golden accents. This collection draws from centuries of artisanal craftsmanship, reimagined for the contemporary connoisseur.</p>
</div>
<span class="edition-label" data-slot="text_2" data-slot-type="text">Limited Edition</span>
</div>
</body>
</html>
