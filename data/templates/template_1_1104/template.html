<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #000010; font-family: 'Inter', sans-serif; color: #ffffff; position: relative; overflow: hidden; }
.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); width: 100%; height: 2100px; }
.cell { position: relative; }
.cell-1 { background: linear-gradient(135deg, #0000cc 0%, #000066 100%); }
.cell-2 { background: linear-gradient(180deg, #000088 0%, #000020 100%); }
.cell-3 { background: linear-gradient(160deg, #000055 0%, #000010 100%); }
.cell-4 { background: #000010; }
.cell-5 { background: #000008; }
.cell-6 { background: linear-gradient(90deg, #000040 0%, #0000aa 50%, #000020 100%); }
.cell-7 { background: linear-gradient(135deg, #000066 0%, #000010 100%); }
.cell-8 { background: linear-gradient(180deg, #000010 0%, #000088 100%); }
.bottom-bar { height: 300px; background: linear-gradient(180deg, #4444ff 0%, #aaaaff 50%, #eeeeff 100%); display: flex; align-items: flex-end; padding: 40px 80px; }
.bottom-bar h1 { font-size: 120px; font-weight: 300; color: #000033; letter-spacing: 4px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="grid">
<div class="cell cell-1"></div>
<div class="cell cell-2"></div>
<div class="cell cell-3"></div>
<div class="cell cell-4"></div>
<div class="cell cell-5"></div>
<div class="cell cell-6"></div>
<div class="cell cell-7"></div>
<div class="cell cell-8"></div>
</div>
<div class="bottom-bar">
<h1 data-slot="text_0" data-slot-type="text">KANDINSKY.COM</h1>
</div>
</body>
</html>
