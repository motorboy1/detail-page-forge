<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Magic Liquid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#1a3ac8;min-height:100vh;color:#fff;overflow:hidden}
.container{max-width:600px;margin:0 auto;position:relative;min-height:100vh;padding:30px}
.brand-icon{font-size:20px;margin-bottom:20px}
.headline-top{font-size:42px;font-weight:900;line-height:1.3;margin-bottom:20px}
.blob{width:300px;height:300px;background:radial-gradient(ellipse at 40% 40%,#6080ff 0%,#3060e0 40%,#2040c0 100%);border-radius:60% 40% 50% 50%/50% 60% 40% 50%;margin:20px auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.blob-hole{width:60px;height:60px;background:#1a3ac8;border-radius:50%;position:absolute;top:40%;left:35%}
.side-text{position:absolute;right:20px;top:30%;writing-mode:vertical-rl;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.6)}
.headline-bottom{font-size:42px;font-weight:900;line-height:1.3;position:absolute;bottom:40px;right:30px;text-align:right}
.dosage{position:absolute;bottom:50px;left:30px;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.6);writing-mode:vertical-rl}
</style></head><body>
<div class="container">
<div class="brand-icon">~</div>
<h1 class="headline-top" data-slot="headline_top">마법의 액상 한방울로</h1>
<div class="blob"><div class="blob-hole"></div></div>
<span class="side-text" data-slot="side_text">REPLACES SODIUM IN EVERYDAY COOKING SITUATIONS</span>
<span class="dosage" data-slot="dosage">0.5MG'S PER SERVING</span>
<div class="headline-bottom" data-slot="headline_bottom">평생을 염분걱정 끝</div>
</div></body></html>
