<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MACH - 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #CC0000 0%, #FF4444 60%, #FF6666 100%);
    display: flex;
    flex-direction: column;
    padding: 48px 40px;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }
  .headline {
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  .subtitle {
    display: inline-block;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 2px solid rgba(255,255,255,0.7);
    padding: 8px 20px;
    margin-top: 16px;
  }
  .spacer { flex: 1; }
  .car-area {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 20px;
  }
  .car-placeholder {
    width: 70%;
    max-width: 400px;
    aspect-ratio: 2.2;
    background: linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #ddd 100%);
    border-radius: 40% 60% 10% 10%;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  @media (max-width: 600px) {
    body { padding: 32px 20px; }
  }
</style>
</head>
<body>
<h1 class="headline" data-slot="text_0" data-slot-type="text">MACH - 5</h1>
<p class="subtitle" data-slot="text_1" data-slot-type="text">Mitsuki Nakamura</p>
<div class="spacer"></div>
<div class="car-area">
<div class="car-placeholder"></div>
</div>
</body>
</html>
