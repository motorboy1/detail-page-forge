<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Studio Never</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif}
.hero{min-height:100vh;background:#7cfc00;display:flex;flex-direction:column;justify-content:space-between;padding:40px 30px;position:relative}
.text-rows{display:flex;flex-direction:column;gap:15px}
.row{display:flex;align-items:center;gap:10px}
.block{background:#000;height:40px;flex:1}
.block-sm{background:#000;width:30px;height:40px}
.word{color:#000;font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;white-space:nowrap}
.brand-area{background:#000;padding:40px;align-self:flex-end;margin-top:auto;position:relative}
.brand-name{color:#7cfc00;font-size:clamp(3rem,7vw,5rem);font-weight:900;line-height:1}
.brand-sub{color:#7cfc00;font-size:clamp(2rem,5vw,4rem);font-weight:400;font-family:monospace;letter-spacing:-2px}
</style></head>
<body>
<section class="hero">
<div class="text-rows">
<div class="row"><div class="block"></div><span class="word">We</span><div class="block"></div></div>
<div class="row"><div class="block-sm"></div><span class="word">Never</span><div class="block"></div><span class="word">Work</span><div class="block-sm"></div></div>
<div class="row"><div class="block"></div><span class="word">We Only</span><div class="block-sm"></div><span class="word">Play</span><div class="block-sm"></div></div>
</div>
<div class="brand-area">
<div class="brand-name">studio</div>
<div class="brand-sub">never</div>
</div>
</section>
</body></html>
