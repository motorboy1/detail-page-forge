<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Spinning Spacetime</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

<div class="container">
<div class="top-bar"><span class="brand-icon">icon</span><span class="brand-name" data-slot="brand">미술연구랩 오바이스</span></div>
<div class="center-section">
<div class="vanish">
<div class="title-row">
<span class="title-ko" data-slot="headline">회전하는</span>

<span class="title-ko">시공간</span>
</div>
</div>
</div>
<div class="bottom">
<div class="desc" data-slot="desc_left">우리가 사는 현재는 사실 과거에서 미래로 가는 한개의 시간 축과 반대로 가는 비논리적인 시간 축이 만나서 그리는 하나의 궤적이다.</div>
<div class="desc" data-slot="desc_right">그렇기에, 우리가 사는 현재 속에서 일어나는 미묘한 일들의 내막은 의외로 미래의 결과에 역으로 영향을 받는다.</div>
</div>
