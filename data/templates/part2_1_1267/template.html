<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>2026 Design Trends</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#1a1a1a;color:#fff;min-height:100vh}
.container{max-width:600px;margin:0 auto;position:relative;overflow:hidden}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px}
.barcode{font-family:monospace;font-size:10px;letter-spacing:-1px}
.year{font-size:16px;font-weight:700}
.hero{position:relative;min-height:360px;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.7) 100%);display:flex;flex-direction:column;justify-content:center;padding:30px 24px}
.category{font-size:14px;color:#ffd700;background:rgba(0,0,0,0.5);display:inline-block;padding:6px 16px;border-radius:4px;margin-bottom:16px}
.headline{font-size:48px;font-weight:900;color:#ffd700;line-height:1.2;text-shadow:2px 2px 0 #000}
.headline-en{font-size:14px;color:#ffd700;letter-spacing:4px;margin-top:8px}
.subtitle{font-size:13px;color:#ccc;margin-top:16px;line-height:1.6}
.items{padding:20px 24px}
.item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.item-num{font-size:14px;font-weight:700;color:#ffd700;width:30px}
.item-text{flex:1;font-size:13px;color:#ccc;margin:0 16px}
.item-pages{font-size:13px;font-weight:700;color:#fff}
</style></head><body>
<div class="container">
<div class="top-bar"><span class="barcode">||||||||||||</span><span>icon</span><span class="year" data-slot="year">2026</span></div>

<span class="category" data-slot="category">2026년의 디자인 트렌드</span>
<h1 class="headline" data-slot="headline">위험천만한 26년 트렌드</h1>
<span class="headline-en" data-slot="headline_en">Malicious 2026 Trends</span>
<p class="subtitle" data-slot="subtitle">대한민국을 강.타.할 2026년의 예술계 트렌드를 전부 모아볼 수 있다면요?</p>
</div>
<div class="items">
<div class="item"><span class="item-num">01</span><span class="item-text" data-slot="item1">대한민국의 시각 디자인 트렌드 분석</span><span class="item-pages">200P</span></div>

</div>
</div></body></html>
