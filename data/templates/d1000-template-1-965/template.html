<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fashion Brand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif}
.hero{min-height:100vh;background:#111;display:flex;flex-direction:column;align-items:center;padding:50px 40px;position:relative}
h1{font-size:clamp(3rem,8vw,6rem);font-weight:900;color:#ff3300;text-transform:uppercase;letter-spacing:5px;text-align:center;line-height:1}
.subtitle{font-size:clamp(1.5rem,3vw,2.5rem);color:#111;font-style:italic;font-family:'Georgia',serif;position:relative;z-index:2;margin-top:-10px}
.product-frame{background:#ff3300;width:70%;max-width:400px;aspect-ratio:3/4;margin:20px 0;display:flex;align-items:center;justify-content:center;position:relative}
.product-frame img{width:90%;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.5))}
.desc{color:#ff3300;font-size:0.9rem;line-height:1.6;text-align:center;max-width:500px;margin-top:auto;padding:20px 0}
</style></head>
<body>
<section class="hero">
<h1>Hugo Boss</h1>
<span class="subtitle">Metzingen</span>
<div class="product-frame"><img src="https://placehold.co/350x450/111/333?text=Jacket" alt="Leather Jacket"></div>
<p class="desc">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Lorem ipsum</p>
</section>
</body></html>
