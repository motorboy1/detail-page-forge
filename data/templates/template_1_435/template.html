<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pretending To Be A Design Genius</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; }
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; position: relative; }
.grid-lines { position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent 0px, transparent 49%, #eee 49%, #eee 50%, transparent 50%) , repeating-linear-gradient(0deg, transparent 0px, transparent 49%, #eee 49%, #eee 50%, transparent 50%); background-size: 25% 20%; z-index: 0; }
.hero-content { position: relative; z-index: 1; }
.hero-title { font-size: 100px; font-weight: 900; color: #000; line-height: 1; border: 3px dashed #6666cc; display: inline-block; padding: 10px 20px; }
.hero-highlight { font-size: 100px; font-weight: 900; color: #6666cc; line-height: 1; border: 3px solid #6666cc; display: inline-block; padding: 10px 20px; margin-top: 10px; }
.hero-footer { background: #000; padding: 40px; margin: 0 -40px -40px; position: relative; z-index: 1; }
.hero-footer p { font-size: 16px; color: #fff; line-height: 1.6; font-style: italic; }
</style>
</head>
<body>
<section class="hero">
<div class="grid-lines"></div>
<div class="hero-content">
<h1 class="hero-title" data-slot="text_0" data-slot-type="text">Pretending To Be A Design</h1>
<div class="hero-highlight" data-slot="text_1" data-slot-type="text">Genius</div>
</div>
<div class="hero-footer">
<p data-slot="text_1" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
</div>
</section>
</body>
</html>
