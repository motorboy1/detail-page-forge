<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Latency Cooling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #c8ff00; color: #000; }
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 40px; }
.hero-title { font-size: 120px; line-height: 0.95; }
.hero-title .italic { font-family: 'Georgia', serif; font-style: italic; font-weight: 400; }
.hero-title .bold { font-weight: 900; }
.hero-description { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.6; max-width: 600px; text-align: center; margin: 0 auto; }
.hero-footer { display: flex; justify-content: space-between; align-items: flex-end; }
.hero-meta { font-size: 20px; font-weight: 900; text-transform: uppercase; }
</style>
</head>
<body>
<section class="hero">
<h1 class="hero-title">
<span class="italic" data-slot="text_0" data-slot-type="text">(Latency)</span><br/>
<span class="bold" data-slot="text_1" data-slot-type="text">Cooling</span>
</h1>
<p class="hero-description" data-slot="text_2" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod</p>
<div class="hero-footer">
<span class="hero-meta" data-slot="text_3" data-slot-type="text">(-14CELSIUS)</span>
<span class="hero-meta" data-slot="text_4" data-slot-type="text">(FOR 5MINS)</span>
</div>
</section>
</body>
</html>
