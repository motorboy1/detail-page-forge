<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Automatic Aid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:40px}
.container{max-width:600px;width:100%;text-align:center}

.module-wide{background:#1a1a1a;color:#fff;border-radius:40px;padding:16px 40px;display:flex;align-items:center;justify-content:center;gap:20px;margin:4px auto}

.desc{font-size:14px;line-height:1.8}
.dots{margin:16px 0;font-size:24px;letter-spacing:8px}
.url-block{background:#1a1a1a;color:#fff;border-radius:30px;padding:16px 32px;margin:4px auto;display:inline-block}
.url-text{font-size:14px;font-weight:700;letter-spacing:2px}
.barcode{margin:8px 0;font-family:monospace;font-size:10px;letter-spacing:-1px}
