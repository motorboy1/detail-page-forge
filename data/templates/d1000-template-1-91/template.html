<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Product Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif}
.hero{min-height:100vh;background:#e8e4f0;display:flex;flex-direction:column;align-items:center;padding:40px 30px}
.chat-bubble{background:#2962ff;color:#fff;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:600;padding:20px 40px;border-radius:20px 20px 20px 4px;margin-bottom:30px;text-align:center;max-width:80%}
.product-card{background:#fff;border-radius:20px;padding:30px;width:80%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;min-height:350px;position:relative}
.product-card::after{content:'';position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:15px solid #fff}
.product-card img{width:70%;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.15))}
.bottom-bar{margin-top:auto;width:100%;display:flex;align-items:flex-end;justify-content:space-between;padding:0 20px}
.bottom-desc{color:#333;font-size:0.7rem;line-height:1.5;text-transform:uppercase;max-width:200px;text-align:right;border-top:2px solid #000;padding-top:10px}
.brand{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:#000;letter-spacing:-1px}
</style></head>
<body>
<section class="hero">
<div class="chat-bubble">How do you think about this one</div>
<div class="product-card"><img src="https://placehold.co/300x300/6b8cce/fff?text=Cap" alt="Product"></div>
<div class="bottom-bar">
<div class="bottom-desc">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod lorem ipsum dolor sit amet, consec</div>
<div class="brand">NoCapMall</div>
</div>
</section>
</body></html>
