<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; min-height: 2400px; background: #dce6f0; font-family: 'Inter', sans-serif; color: #1a1a2e; position: relative; overflow: hidden; }
.container { padding: 60px 80px; min-height: 2400px; display: flex; flex-direction: column; }
.word-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 0; flex: 1; }
.cell { display: flex; align-items: center; justify-content: center; font-size: 100px; font-weight: 600; color: #1a1a2e; padding: 10px; }
.cell.highlight-h { background: rgba(40,120,200,0.15); border-radius: 50px; position: relative; color: #1a6ed8; }
.cell.highlight-v { background: rgba(40,120,200,0.1); color: #1a6ed8; }
.h-group { display: contents; }
.body-text { padding: 40px 60px; max-width: 600px; }
.body-text p { font-size: 20px; line-height: 1.6; color: #1a1a2e; font-weight: 400; }
</style>
</head>
<body>
<div class="container">
<div class="word-grid">
<!-- Row 1 -->
<div class="cell">a</div><div class="cell">b</div><div class="cell">c</div><div class="cell">d</div><div class="cell">e</div><div class="cell">f</div><div class="cell">g</div><div class="cell">h</div><div class="cell">i</div>
<!-- Row 2 -->
<div class="cell">b</div><div class="cell">a</div><div class="cell">c</div><div class="cell">d</div><div class="cell">g</div><div class="cell highlight-v">e</div><div class="cell">h</div><div class="cell">i</div><div class="cell">f</div>
<!-- Row 3: "design" horizontal -->
<div class="cell">f</div><div class="cell highlight-h">d</div><div class="cell highlight-h">e</div><div class="cell highlight-h">s</div><div class="cell highlight-h">i</div><div class="cell highlight-h">g</div><div class="cell highlight-h">n</div><div class="cell">i</div><div class="cell">g</div>
<!-- Row 4 -->
<div class="cell">c</div><div class="cell">d</div><div class="cell">f</div><div class="cell">e</div><div class="cell">b</div><div class="cell highlight-v">e</div><div class="cell">i</div><div class="cell">a</div><div class="cell">g</div>
<!-- Row 5 -->
<div class="cell">a</div><div class="cell">b</div><div class="cell">d</div><div class="cell">e</div><div class="cell">c</div><div class="cell highlight-v">n</div><div class="cell">h</div><div class="cell">f</div><div class="cell">i</div>
<!-- Row 6 -->
<div class="cell">c</div><div class="cell">d</div><div class="cell">f</div><div class="cell">e</div><div class="cell">b</div><div class="cell highlight-v">i</div><div class="cell">i</div><div class="cell">a</div><div class="cell">g</div>
<!-- Row 7 -->
<div class="cell">f</div><div class="cell">d</div><div class="cell">c</div><div class="cell">a</div><div class="cell">e</div><div class="cell highlight-v">u</div><div class="cell">h</div><div class="cell">i</div><div class="cell">g</div>
<!-- Row 8 -->
<div class="cell">c</div><div class="cell">d</div><div class="cell">f</div><div class="cell">e</div><div class="cell">b</div><div class="cell highlight-v">s</div><div class="cell">i</div><div class="cell">a</div><div class="cell">g</div>
<!-- Row 9 -->
<div class="cell">a</div><div class="cell">b</div><div class="cell">c</div><div class="cell">d</div><div class="cell">e</div><div class="cell">f</div><div class="cell">g</div><div class="cell">h</div><div class="cell">i</div>
</div>
<div class="body-text">
<p data-slot="text_0" data-slot-type="text">Lorem ipsum dolor sit amet, consec adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
</div>
</div>
</body>
</html>
