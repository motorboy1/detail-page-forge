<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Balloon Ontology</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f0f0;min-height:100vh;padding:30px}
.container{max-width:600px;margin:0 auto;position:relative}

.c4{width:150px;height:150px;background:radial-gradient(circle at 30% 30%,#60ffff,#20d0e0);top:120px;right:0;box-shadow:0 0 40px rgba(80,255,255,0.4)}
.c5{width:120px;height:120px;background:radial-gradient(circle at 30% 30%,#ff6060,#d02020);top:300px;right:80px;box-shadow:0 0 40px rgba(255,80,80,0.4)}
.headline{font-size:42px;font-weight:900;color:#1a1a1a;line-height:1.25;position:relative;z-index:1;mix-blend-mode:multiply}
</style></head><body>
<div class="container">
<p class="intro" data-slot="intro">탄생과 죽음, 구매와 폐기, 만남과 헤어짐을 모두 아우르는 2025년의 새로운 존재론에 대한 탐구를 따라와보세요.</p>

<div class="circles">
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>
<div class="circle c4"></div>
<div class="circle c5"></div>

</div>
