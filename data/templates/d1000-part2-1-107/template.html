<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sticker Business</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Helvetica Neue',sans-serif}
.hero{min-height:100vh;background:#fff;display:flex;flex-direction:column;padding:30px 25px;position:relative}
h1{font-size:clamp(3rem,8vw,5rem);font-weight:900;color:#000;line-height:1;margin-bottom:20px}
.badges-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.badge{padding:8px 20px;border-radius:50px;font-size:0.8rem;font-weight:700;white-space:nowrap}
.badge-cyan{background:#00e5ff;color:#000;border:2px solid #000}
.badge-green{background:#4cff00;color:#000}
.badge-yellow{background:#ffe600;color:#000}
.badge-blue{background:#4488ff;color:#fff;border-radius:0;clip-path:polygon(0 0,100% 0,95% 50%,100% 100%,0 100%)}
.badge-pink{background:#ff66cc;color:#000;border-radius:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%)}
.features-row{display:flex;justify-content:space-between;gap:15px;margin:20px 0}
.feature{flex:1}
.feature p{font-size:0.75rem;color:#333;line-height:1.6;text-align:center}
.bottom-section{margin-top:auto}
.bottom-section h1{margin-top:20px}
.badges-row-2{display:flex;flex-wrap:wrap;gap:10px}
</style></head>
<body>
<section class="hero">
<h1>스티커의 비극</h1>
<div class="badges-row">
<span class="badge badge-cyan">2026 베스트</span>
<span class="badge badge-green">정말로 도전?</span>
<span class="badge badge-yellow">회계사지음</span>
<span class="badge badge-blue">창업의 비밀들</span>
</div>
<div class="features-row">
<div class="feature"><p>스티커 사진관의 마진률과 실제 점주의 순수익 분석 및 미래 동향 예측</p></div>
<div class="feature"><p>무인매장 프랜차이즈 전문 회계법인에서 발견한 무인 매장 창업 트렌드</p></div>
<div class="feature"><p>뿐만 아니라, 다양한 무인 점포의 생태계 분석 및 2026 유망 산업 제안</p></div>
</div>
<div class="bottom-section">
<div class="badges-row-2">
<span class="badge badge-pink">체크리스트</span>
<span class="badge" style="background:#ff6600;color:#fff;border-radius:50px">무인 매장</span>
<span class="badge badge-green">도전?</span>
<span class="badge badge-cyan">어워드 수상</span>
</div>
<h1>스티커 아티스</h1>
</div>
</section>
</body></html>
