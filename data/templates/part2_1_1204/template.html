<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Discherschem Mattress</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f8f0;min-height:100vh}

.grid-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,rgba(180,220,180,0.15) 0px,rgba(180,220,180,0.15) 1px,transparent 1px,transparent 200px),repeating-linear-gradient(0deg,rgba(180,220,180,0.15) 0px,rgba(180,220,180,0.15) 1px,transparent 1px,transparent 200px)}

.url{font-size:13px;color:#6a9a6a;margin-bottom:60px}

<div class="container">
<div class="grid-overlay"></div>
<div class="brand-side" data-slot="brand_name">DISCHERSCHEM</div>

<div class="info-row"><span class="info-label" data-slot="company_name">주식회사 뒤르켐</span><span class="info-value">DISCHERSCHEM</span><span class="info-value" data-slot="brand_year">2025</span></div>
